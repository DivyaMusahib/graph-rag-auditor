name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # Triggers the workflow whenever you push to the main branch

  # Allows you to manually trigger this workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Hugging Face Hub
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: divyamusahib/graph-rag-auditor
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker