<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin:0; background:#0a0f1c; font-family:'JetBrains Mono',monospace; color: rgba(255,255,255,0.6); }
        .vsc-wrap { background:#0a0f1c; overflow:hidden; }
        .vsc-file-item { display:flex; align-items:center; gap:0.4rem; padding:0.28rem 0.75rem; font-size:0.75rem; cursor:pointer; border-left:2px solid transparent; transition:all 0.12s; }
        .vsc-file-item:hover { background:rgba(0,149,255,0.08); color:#fff; }
        .vsc-file-item.active { background:rgba(0,149,255,0.13); border-left:2px solid #0095FF; color:#fff; }
        .vsc-dir-item { display:flex; align-items:center; gap:0.35rem; padding:0.28rem 0.75rem; font-size:0.75rem; color:rgba(255,255,255,0.55); cursor:pointer; transition:background 0.12s; }
        .vsc-dir-item:hover { background:rgba(255,255,255,0.04); color:#fff; }
        .vsc-dir-arrow { font-size:0.55rem; transition:transform 0.15s; display:inline-block; width:10px; color:rgba(255,255,255,0.35); }
        .vsc-file-icon { font-size:0.85rem; }
    </style>
</head>
<body>
    <div class="vsc-wrap">
        <div id="tree"></div>
    </div>
    <script>
        function sendMessageToStreamlitClient(type, data) {
            window.parent.postMessage(Object.assign({isStreamlitMessage: true, type: type}, data), "*");
        }

        let activeEl = null;
        let isFirstRender = true;

        window.addEventListener("message", function(event) {
            if (event.data.type === "streamlit:render") {
                if (isFirstRender) {
                    const treeHtml = event.data.args.tree_html;
                    document.getElementById("tree").innerHTML = treeHtml;
                    
                    // Auto-expand first level
                    document.querySelectorAll('.vsc-dir-item').forEach((el, i) => { if (i === 0) el.click(); });
                    isFirstRender = false;
                }
                sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: document.body.scrollHeight});
            }
        });
        
        sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});

        function toggleDir(id) {
            const el = document.getElementById('dir_' + id);
            const arr = document.getElementById('arr_' + id);
            if (!el) return;
            const open = el.style.display !== 'none';
            el.style.display = open ? 'none' : 'block';
            if (arr) arr.style.transform = open ? '' : 'rotate(90deg)';
            sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: document.body.scrollHeight});
        }

        function selectFile(path) {
            if (activeEl) activeEl.classList.remove('active');
            const els = document.querySelectorAll('.vsc-file-item');
            for (let e of els) { if (e.dataset.path === path) { e.classList.add('active'); activeEl = e; break; } }
            sendMessageToStreamlitClient("streamlit:setComponentValue", {value: path});
        }
    </script>
</body>
</html>
